<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#111418">
<title>Personal Training Notes</title>
<style>
  :root {
    --bg: #0f1216;
    --surface: #171b21;
    --border: #2a323c;
    --text: #e8ecf1;
    --muted: #93a1b0;
    --accent: #4ade80;
    --radius: 14px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #dfe3e8;
      --text: #16191d;
      --muted: #5c6874;
      --accent: #16a34a;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 64px;
  }

  header h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }

  header p {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  h2.section {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 10px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }

  a.card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-decoration: none;
    color: inherit;
  }

  a.card:hover {
    border-color: var(--accent);
  }

  a.card .title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-weight: 650;
    font-size: 1.02rem;
  }

  a.card .title::after {
    content: "→";
    color: var(--muted);
  }

  a.card:hover .title::after { color: var(--accent); }

  a.card .desc {
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.87rem;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: #06170d;
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 10px;
  }

  @media (prefers-color-scheme: light) {
    .badge { color: #fff; }
  }

  footer {
    margin-top: 32px;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Personal Training Notes</h1>
    <p>Planos alimentares e notas de treino</p>
  </header>

  <h2 class="section">Planos alimentares</h2>
  <div class="cards">
    <a class="card" href="menu/july/index.html">
      <span class="title">Julho</span>
      <span class="desc">Hipertrofia com recomposição · 3.200–3.400 kcal</span>
      <span class="badge">Atual</span>
    </a>
  </div>

  <footer>
    Novo mês: criar <code>menu/&lt;mes&gt;/index.html</code> e adicionar um cartão acima.
  </footer>

</div>
</body>
</html>
